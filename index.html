<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gutter Ghosts — Operations Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111111;
    --surface: #1C1C1C;
    --surface2: #242424;
    --border: #2a2a2a;
    --pink: #F17EA9;
    --pink-dim: rgba(241,126,169,0.10);
    --text: #F0F0F0;
    --muted: #777;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(241,126,169,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(241,126,169,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 72px 28px 100px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--pink);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: up 0.55s 0.0s ease forwards;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 7vw, 58px);
    line-height: 1;
    letter-spacing: -0.025em;
    opacity: 0;
    animation: up 0.55s 0.1s ease forwards;
  }

  .logo em { font-style: normal; color: var(--pink); }

  .sub {
    margin-top: 14px;
    font-size: 13.5px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.02em;
    opacity: 0;
    animation: up 0.55s 0.18s ease forwards;
  }

  .rule {
    width: 40px;
    height: 2px;
    background: var(--pink);
    margin: 32px 0 52px;
    opacity: 0;
    animation: up 0.55s 0.24s ease forwards;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 26px 26px;
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
    min-height: 220px;
    transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    opacity: 0;
    animation: up 0.55s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.32s; }
  .card:nth-child(2) { animation-delay: 0.42s; }
  .card:nth-child(3) { animation-delay: 0.52s; }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 0% 0%, rgba(241,126,169,0.12), transparent 65%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .card:hover { border-color: var(--pink); background: var(--surface2); transform: translateY(-4px); }
  .card:hover::after { opacity: 1; }

  .card-num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--pink);
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -0.01em;
    line-height: 1.15;
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    position: relative;
    z-index: 1;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-arrow {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--pink);
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }

  .card:hover .card-arrow {
    background: var(--pink);
    border-color: var(--pink);
    color: #111;
    transform: rotate(45deg);
  }

  .footer {
    margin-top: 64px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: up 0.55s 0.7s ease forwards;
  }

  .footer-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .footer-brand em { font-style: normal; color: var(--pink); }

  .footer-ts {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--border);
    letter-spacing: 0.1em;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="eyebrow">Internal Operations</div>
  <div class="logo">GUTTER <em>GHOSTS</em></div>
  <div class="sub">Operations Hub &nbsp;·&nbsp; Internal Use Only</div>
  <div class="rule"></div>

  <div class="grid">

    <a class="card" href="mastercomms.html">
      <div class="card-num">01</div>
      <div class="card-title">MASTER COMMUNICATIONS</div>
      <div class="card-footer">
        <span class="card-label">Scripts &amp; Templates</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

    <a class="card" href="gg_calculators.html">
      <div class="card-num">02</div>
      <div class="card-title">FIELD TOOLS</div>
      <div class="card-footer">
        <span class="card-label">Calculators &amp; Quoting</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

    <a class="card" href="https://ghost-intake-portal.lovable.app/" target="_blank" rel="noopener">
      <div class="card-num">03</div>
      <div class="card-title">PORTAL</div>
      <div class="card-footer">
        <span class="card-label">Lead Intake</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

  </div>

  <div class="footer">
    <span class="footer-brand">GUTTER <em>GHOSTS</em> &nbsp;·&nbsp; Internal</span>
    <span class="footer-ts" id="ts"></span>
  </div>

</div>
<script>
  const ts = document.getElementById('ts');
  const now = new Date();
  ts.textContent = now.toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric' });
</script>
</body>
</html>
